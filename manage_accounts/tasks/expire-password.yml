---
# manage_accounts/tasks/expire-passwords.yml

# NOTE: ansible.builtin.user has password_expire_max/min but no
# "force expire now" equivalent. chage -d 0 seems to be the way
# to achieve this here after reviewing Gemini and Claude search
# results.
- name: "Expire passwords"
  ansible.builtin.command:
    cmd: chage -d 0 "{{ item }}"
  loop: "{{ user_list | mandatory }}"
  changed_when: true
